<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Purple background -->
  <rect width="512" height="512" rx="80" fill="#4B1D8F"/>
  <!-- "C+" symbol in gold -->
  <text x="256" y="300" 
    font-family="Arial Black, Arial, sans-serif" 
    font-size="260" 
    font-weight="900"
    fill="#FACC15"
    text-anchor="middle"
    dominant-baseline="middle">C+</text>
  <!-- "CargoPlus" text at bottom -->
  <text x="256" y="440" 
    font-family="Arial, sans-serif" 
    font-size="62" 
    font-weight="700"
    fill="white"
    text-anchor="middle"
    opacity="0.9">CargoPlus</text>
</svg>
